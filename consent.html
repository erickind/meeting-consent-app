<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meeting Consent</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      height: 100vh;
      padding: 12px 14px;
      overflow: hidden;
    }

    /* Header */
    .header { margin-bottom: 10px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 1px; }
    .header p  { font-size: 11px; color: #8a8fa8; }

    /* Tabs */
    .tabs {
      display: flex;
      background: #eef0f6;
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 10px;
    }
    .tab {
      flex: 1; text-align: center; padding: 5px 0;
      border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 500; color: #8a8fa8;
      transition: all .2s;
    }
    .tab.active { background: white; color: #1a1a2e; font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    /* Fields */
    .field { margin-bottom: 7px; }
    .field label { display: block; font-size: 10px; font-weight: 600; color: #8a8fa8; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .field input {
      width: 100%; padding: 7px 10px;
      border: 1.5px solid #eef0f6; border-radius: 8px;
      font-size: 12px; color: #1a1a2e; background: white;
      outline: none; transition: border-color .2s;
    }
    .field input:focus { border-color: #667eea; }

    /* Consent cards */
    .consent-cards { display: flex; flex-direction: column; gap: 7px; margin: 10px 0; }
    .consent-card {
      background: white; border-radius: 10px;
      padding: 10px 12px; cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      transition: all .2s;
      display: flex; align-items: center; gap: 10px;
    }
    .consent-card:hover { box-shadow: 0 2px 6px rgba(0,0,0,.1); }
    .consent-card.active { border-color: #667eea; background: #f5f4ff; }

    .card-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
      background: #f0f0f8;
      transition: background .2s;
    }
    .consent-card.active .card-icon { background: #ebe8ff; }

    .card-text { flex: 1; }
    .card-title { font-size: 12px; font-weight: 600; color: #1a1a2e; margin-bottom: 1px; }
    .card-desc  { font-size: 11px; color: #8a8fa8; line-height: 1.3; }

    .toggle {
      width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
      border: 2px solid #d0d4e8; background: white;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .consent-card.active .toggle { background: #667eea; border-color: #667eea; }
    .toggle svg { display: none; }
    .consent-card.active .toggle svg { display: block; }

    /* Submit button */
    .btn-submit {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: opacity .2s; margin-top: 2px;
    }
    .btn-submit:hover    { opacity: .9; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* Status */
    .status {
      border-radius: 10px; padding: 12px 14px;
      font-size: 13px; font-weight: 600;
      text-align: center; margin-top: 12px; display: none;
    }
    .status.success { background: #e8f8f0; color: #1a7f4b; display: block; }
    .status.error   { background: #feeef0; color: #c0392b; display: block; }
    .status.loading { background: #f0f0ff; color: #667eea; display: block; }

    /* Results */
    #results-panel { display: none; }
    .refresh-btn {
      width: 100%; padding: 11px;
      background: white; color: #667eea;
      border: 2px solid #eef0f6; border-radius: 12px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      margin-bottom: 14px; transition: all .2s;
    }
    .refresh-btn:hover { border-color: #667eea; background: #f5f4ff; }

    .result-item {
      background: white; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .result-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }
    .result-name { font-size: 13px; font-weight: 600; }
    .result-time { font-size: 11px; color: #8a8fa8; }
    .result-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge-yes { background: #e8f8f0; color: #1a7f4b; }
    .badge-no  { background: #feeef0; color: #c0392b; }
    .badge-label { font-weight: 400; opacity: .7; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Meeting Consent</h1>
    <p>Your choices are recorded for compliance</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('consent')">Give Consent</div>
    <div class="tab" onclick="showTab('results')">Results</div>
  </div>

  <!-- CONSENT TAB -->
  <div id="consent-panel">

    <div class="field">
      <label>Your Name</label>
      <input id="inp-name" type="text" placeholder="Alex Thompson"/>
    </div>
    <div class="field">
      <label>Your Email</label>
      <input id="inp-email" type="email" placeholder="alex@yourorg.com"/>
    </div>

    <div class="consent-cards">
      <div class="consent-card" id="card-rec" onclick="toggle('rec')">
        <div class="card-icon">🎥</div>
        <div class="card-text">
          <div class="card-title">Recording</div>
          <div class="card-desc">I consent to this meeting being recorded and stored.</div>
        </div>
        <div class="toggle" id="tog-rec">
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4L4 7L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="consent-card" id="card-ai" onclick="toggle('ai')">
        <div class="card-icon">🤖</div>
        <div class="card-text">
          <div class="card-title">AI Transcription</div>
          <div class="card-desc">I consent to AI being used to transcribe this meeting.</div>
        </div>
        <div class="toggle" id="tog-ai">
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4L4 7L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="submitConsent()">Submit Consent</button>
    <div class="status" id="status-msg"></div>

  </div>

  <!-- RESULTS TAB -->
  <div id="results-panel">
    <button class="refresh-btn" onclick="loadResults()">↻ &nbsp;Refresh Results</button>
    <div id="results-content">
      <p style="color:#8a8fa8;font-size:12px;text-align:center;padding:20px 0">Click Refresh to load responses.</p>
    </div>
  </div>

<script>
  // ── CONFIG ───────────────────────────────────────────────────
  const SUPABASE_URL  = "https://aqsjwbhrdxkfildtvuwx.supabase.co";
  const SUPABASE_ANON = "sb_publishable_QClM3SEEYNXkg93VJM_VAw_yakUQOdu";
  // ─────────────────────────────────────────────────────────────

  const API     = `${SUPABASE_URL}/rest/v1/meeting_consents`;
  const HEADERS = { "Content-Type": "application/json", "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}` };

  let meetingId = "", meetingName = "";
  const state = { rec: false, ai: false };

  microsoftTeams.app.initialize().then(() => {
    microsoftTeams.app.getContext().then(ctx => {
      if (ctx.user?.displayName) document.getElementById("inp-name").value  = ctx.user.displayName;
      if (ctx.user?.loginHint)   document.getElementById("inp-email").value = ctx.user.loginHint;
      meetingId   = ctx.meeting?.id   || `manual-${Date.now()}`;
      meetingName = ctx.meeting?.name || "Meeting";
      // Update avatar initials
      const name = ctx.user?.displayName || "";
      document.getElementById("av").textContent = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    });
  }).catch(() => { meetingId = `preview-${Date.now()}`; meetingName = "Preview"; });

  function toggle(key) {
    if (document.getElementById("submit-btn").disabled) return;
    state[key] = !state[key];
    document.getElementById(`card-${key}`).classList.toggle("active", state[key]);
  }

  async function submitConsent() {
    const name  = document.getElementById("inp-name").value.trim();
    const email = document.getElementById("inp-email").value.trim();
    if (!name || !email) return showStatus("error", "Please enter your name and email.");
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showStatus("error", "Please enter a valid email address.");

    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    showStatus("loading", "Submitting...");

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { ...HEADERS, "Prefer": "resolution=merge-duplicates" },
        body: JSON.stringify({ meeting_id: meetingId, meeting_name: meetingName, user_name: name, user_email: email, consent_record: state.rec, consent_ai: state.ai })
      });
      if (!res.ok) throw new Error();
      showStatus("success", "✓ Consent recorded — thank you!");
      btn.textContent = "Consent Submitted";
    } catch {
      showStatus("error", "Something went wrong. Please try again.");
      btn.disabled = false;
    }
  }

  async function loadResults() {
    const email = document.getElementById("inp-email").value.trim();
    const el = document.getElementById("results-content");
    el.innerHTML = '<p style="color:#667eea;font-size:12px;text-align:center;padding:20px 0">Loading...</p>';
    try {
      const check = await fetch(`${API}?meeting_id=eq.${encodeURIComponent(meetingId)}&user_email=eq.${encodeURIComponent(email)}&select=id`, { headers: HEADERS });
      const found = await check.json();
      if (!found.length) { el.innerHTML = '<p style="color:#c0392b;font-size:12px;text-align:center;padding:20px 0">Submit your consent first to view results.</p>'; return; }

      const res  = await fetch(`${API}?meeting_id=eq.${encodeURIComponent(meetingId)}&select=user_name,consent_record,consent_ai,created_at&order=created_at.asc`, { headers: HEADERS });
      const data = await res.json();
      if (!data.length) { el.innerHTML = '<p style="color:#8a8fa8;font-size:12px;text-align:center;padding:20px 0">No responses yet.</p>'; return; }

      el.innerHTML = data.map(r => `
        <div class="result-item">
          <div class="result-top">
            <span class="result-name">${r.user_name}</span>
            <span class="result-time">${new Date(r.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
          </div>
          <div class="result-badges">
            <span class="badge ${r.consent_record?'badge-yes':'badge-no'}"><span class="badge-label">Recording</span> ${r.consent_record?'Yes':'No'}</span>
            <span class="badge ${r.consent_ai?'badge-yes':'badge-no'}"><span class="badge-label">AI</span> ${r.consent_ai?'Yes':'No'}</span>
          </div>
        </div>`).join("");
    } catch { el.innerHTML = '<p style="color:#c0392b;font-size:12px;text-align:center;padding:20px 0">Could not load results.</p>'; }
  }

  function showTab(t) {
    document.querySelectorAll(".tab").forEach((el,i) => el.classList.toggle("active",(i===0&&t==="consent")||(i===1&&t==="results")));
    document.getElementById("consent-panel").style.display = t==="consent"?"block":"none";
    document.getElementById("results-panel").style.display  = t==="results"?"block":"none";
  }

  function showStatus(type, text) {
    const el = document.getElementById("status-msg");
    el.className = `status ${type}`;
    el.textContent = text;
  }
</script>
</body>
</html>
